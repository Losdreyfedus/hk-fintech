# =====================================================
# SECRET — Hassas Veriler (Şifreler, Anahtarlar)
# =====================================================
# Secret, şifreleri ve hassas bilgileri base64 encode
# ederek saklar. ConfigMap'ten farkı:
#   - etcd'de opsiyonel şifrelenebilir (encryption at rest)
#   - RBAC ile erişimi kısıtlanabilir
#   - Pod loglarında maskelenir
#
# ÖNEMLİ: Üretim ortamında mutlaka Sealed Secrets,
# Vault veya External Secrets Operator kullanılmalıdır.
# Bu dosyadaki base64 değerler sadece geliştirme içindir.
#
# base64 encode: echo -n 'değer' | base64
# =====================================================
apiVersion: v1
kind: Secret
metadata:
  name: hk-fintech-secret
  namespace: hk-fintech
  labels:
    app.kubernetes.io/part-of: hk-fintech-hk-fintech
type: Opaque
data:
  # echo -n 'postgres' | base64 = cG9zdGdyZXM=
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=

  # echo -n '5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437' | base64
  JWT_SECRET_KEY: NTM2NzU2NkI1OTcwMzM3MzM2NzYzOTc5MkY0MjNGNDUyODQ4MkI0RDYyNTE2NTU0Njg1NzZENUE3MTM0NzQzNw==
