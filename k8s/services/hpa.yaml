apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: card-service-hpa
  namespace: hk-fintech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: card-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
