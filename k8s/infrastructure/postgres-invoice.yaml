apiVersion: v1
kind: Service
metadata:
  name: postgres-invoice
  namespace: hk-fintech
  labels:
    app: postgres-invoice
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres-invoice

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-invoice
  namespace: hk-fintech
spec:
  serviceName: postgres-invoice
  replicas: 1
  selector:
    matchLabels:
      app: postgres-invoice
  template:
    metadata:
      labels:
        app: postgres-invoice
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: hk-fintech-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hk-fintech-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "invoice_db"
          volumeMounts:
            - name: postgres-invoice-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: postgres-invoice-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
