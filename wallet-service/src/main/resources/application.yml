server:
  port: 9091

spring:
  application:
    name: wallet-service
  datasource:

    url: jdbc:postgresql://localhost:5433/wallet_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Buraya güvenlik ayarları gelecek ama şimdilik boş bırakalım.