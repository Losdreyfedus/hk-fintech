server:
  port: 9093

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5435/payment_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect