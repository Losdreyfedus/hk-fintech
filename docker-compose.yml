version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION}
    container_name: hk-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    networks:
      - hk-fintech-network

  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION}
    container_name: hk-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - hk-fintech-network

  postgres-identity:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-identity-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=identity_db
    ports:
      - "${IDENTITY_DB_PORT}:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-wallet:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-wallet-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=wallet_db
    ports:
      - "${WALLET_DB_PORT}:5432"
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-card:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-card-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=card_db
    ports:
      - "${CARD_DB_PORT}:5432"
    volumes:
      - postgres_card_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-payment:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-payment-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=payment_db
    ports:
      - "${PAYMENT_DB_PORT}:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-invoice:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-invoice-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=invoice_db
    ports:
      - "${INVOICE_DB_PORT}:5432"
    volumes:
      - postgres_invoice_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELK_VERSION}
    container_name: hk-elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=hk-fintech-cluster
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - hk-fintech-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELK_VERSION}
    container_name: hk-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./elk/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    networks:
      - hk-fintech-network

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELK_VERSION}
    container_name: hk-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - hk-fintech-network

  # =====================================================
  # MİKROSERVİSLER
  # =====================================================
  # Build context: root dizin (hk-common-lib erişimi için)
  # Her servis kendi DB'sine ve Kafka'ya bağımlıdır
  # Ortam değişkenleri ile container içi bağlantılar sağlanır
  # =====================================================

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: hk-identity-service
    depends_on:
      - postgres-identity
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-identity:5432/identity_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APPLICATION_SECURITY_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - APPLICATION_SECURITY_JWT_EXPIRATION=${JWT_EXPIRATION}
    ports:
      - "9090:9090"
    networks:
      - hk-fintech-network
    restart: on-failure

  wallet-service:
    build:
      context: .
      dockerfile: wallet-service/Dockerfile
    container_name: hk-wallet-service
    depends_on:
      - postgres-wallet
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-wallet:5432/wallet_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - IDENTITY_SERVICE_URL=http://identity-service:9090
      - PAYMENT_SERVICE_URL=http://payment-service:9093
    ports:
      - "9091:9091"
    networks:
      - hk-fintech-network
    restart: on-failure

  card-service:
    build:
      context: .
      dockerfile: card-service/Dockerfile
    container_name: hk-card-service
    depends_on:
      - postgres-card
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-card:5432/card_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - IDENTITY_SERVICE_URL=http://identity-service:9090
    ports:
      - "9092:9092"
    networks:
      - hk-fintech-network
    restart: on-failure

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: hk-payment-service
    depends_on:
      - postgres-payment
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-payment:5432/payment_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - IDENTITY_SERVICE_URL=http://identity-service:9090
      - CARD_SERVICE_URL=http://card-service:9092
      - WALLET_SERVICE_URL=http://wallet-service:9091
    ports:
      - "9093:9093"
    networks:
      - hk-fintech-network
    restart: on-failure

  invoice-service:
    build:
      context: .
      dockerfile: invoice-service/Dockerfile
    container_name: hk-invoice-service
    depends_on:
      - postgres-invoice
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-invoice:5432/invoice_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INVOICE_DB_PORT=5432
      - IDENTITY_SERVICE_URL=http://identity-service:9090
      - PAYMENT_SERVICE_URL=http://payment-service:9093
    ports:
      - "9094:9094"
    networks:
      - hk-fintech-network
    restart: on-failure

volumes:
  postgres_identity_data:
  postgres_wallet_data:
  postgres_card_data:
  postgres_payment_data:
  postgres_invoice_data:
  elasticsearch_data:

networks:
  hk-fintech-network:
    driver: bridge