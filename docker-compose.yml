version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION}
    container_name: hk-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    networks:
      - hk-fintech-network

  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION}
    container_name: hk-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - hk-fintech-network

  postgres-identity:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-identity-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=identity_db
    ports:
      - "${IDENTITY_DB_PORT}:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-wallet:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-wallet-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=wallet_db
    ports:
      - "${WALLET_DB_PORT}:5432"
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-card:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-card-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=card_db
    ports:
      - "${CARD_DB_PORT}:5432"
    volumes:
      - postgres_card_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-payment:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-payment-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=payment_db
    ports:
      - "${PAYMENT_DB_PORT}:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  postgres-invoice:
    image: postgres:${POSTGRES_VERSION}
    container_name: hk-invoice-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=invoice_db
    ports:
      - "${INVOICE_DB_PORT}:5432"
    volumes:
      - postgres_invoice_data:/var/lib/postgresql/data
    networks:
      - hk-fintech-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELK_VERSION}
    container_name: hk-elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=hk-fintech-cluster
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - hk-fintech-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELK_VERSION}
    container_name: hk-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./elk/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    networks:
      - hk-fintech-network

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELK_VERSION}
    container_name: hk-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - hk-fintech-network

volumes:
  postgres_identity_data:
  postgres_wallet_data:
  postgres_card_data:
  postgres_payment_data:
  postgres_invoice_data:
  elasticsearch_data:

networks:
  hk-fintech-network:
    driver: bridge